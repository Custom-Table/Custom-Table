<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - لافوتنا</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* تنسيقات خاصة بلوحة التحكم متوافقة تماماً مع الجوال */
        body { background-color: #f4f7f6; }
        .admin-container {
            max-width: 500px; /* لتبدو ممتازة على الجوال */
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .admin-header {
            text-align: center;
            margin-bottom: 20px;
            color: #364858;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: inherit;
        }
        .submit-btn {
            width: 100%;
            background-color: #364858;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2 class="admin-header">إضافة منتج جديد</h2>
        
        <form id="addProductForm">
            <div class="form-group">
                <label for="productName">اسم المنتج</label>
                <input type="text" id="productName" placeholder="مثال: طاولة وسط زجاجية" required>
            </div>

            <div class="form-group">
                <label for="productCategory">القسم</label>
                <select id="productCategory">
                    <option value="dining">طاولات طعام</option>
                    <option value="center">طاولات وسط</option>
                </select>
            </div>

            <div class="form-group">
                <label for="productDescription">الوصف</label>
                <textarea id="productDescription" rows="4" placeholder="اكتب تفاصيل ومقاسات المنتج هنا..."></textarea>
            </div>

            <div class="form-group">
                <label for="productImage">صورة المنتج</label>
                <input type="file" id="productImage" accept="image/*" required>
            </div>

            <button type="submit" class="submit-btn">حفظ وإضافة المنتج</button>
        </form>
    </div>

    <script>
        // هنا سيتم ربط الفورم لاحقاً بقاعدة البيانات (Backend)
        document.getElementById('addProductForm').addEventListener('submit', function(e) {
            e.preventDefault(); // يمنع إعادة تحميل الصفحة
            alert('تم تجهيز الواجهة بنجاح! سيتم حفظ البيانات عندما نقوم بربط قاعدة البيانات في الخطوة القادمة.');
        });
    </script>
</body>
</html>
