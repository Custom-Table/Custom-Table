<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لافوتنا - للأثاث</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- الشريط العلوي -->
    <header class="main-header">
        <div class="logo">
            <h2>لافوتنا</h2>
        </div>
        <div class="search-container">
            <input type="text" placeholder="البحث..." class="search-bar">
        </div>
    </header>

    <!-- قسم طاولات الطعام -->
    <section class="category-section" id="dining-tables-section">
        <div class="section-header">
            <h3>طاولات طعام</h3>
            <button class="view-all-btn">عرض الكل</button>
        </div>
        
        <div class="carousel-wrapper">
            <button class="slide-btn right-btn">&gt;</button>
            
            <div class="products-carousel" id="dining-carousel">
                <!-- منتج 1 -->
                <div class="product-card" data-name="طاولة طعام رخامية 8 كراسي">
                    <img src="images/table1.jpg" alt="طاولة طعام">
                    <div class="product-info">
                        <button class="whatsapp-btn">اطلب عبر الواتساب</button>
                    </div>
                </div>
                <!-- منتج 2 -->
                <div class="product-card" data-name="طاولة طعام خشب زان">
                    <img src="images/table2.jpg" alt="طاولة طعام">
                    <div class="product-info">
                        <button class="whatsapp-btn">اطلب عبر الواتساب</button>
                    </div>
                </div>
                <!-- منتج 3 -->
                <div class="product-card" data-name="طاولة طعام دائرية مودرن">
                    <img src="images/table3.jpg" alt="طاولة طعام">
                    <div class="product-info">
                        <button class="whatsapp-btn">اطلب عبر الواتساب</button>
                    </div>
                </div>
                <!-- منتج 4 -->
                <div class="product-card" data-name="طاولة طعام كلاسيك">
                    <img src="images/table4.jpg" alt="طاولة طعام">
                    <div class="product-info">
                        <button class="whatsapp-btn">اطلب عبر الواتساب</button>
                    </div>
                </div>
                <!-- منتج 5 -->
                <div class="product-card" data-name="طاولة طعام زجاجية">
                    <img src="images/table5.jpg" alt="طاولة طعام">
                    <div class="product-info">
                        <button class="whatsapp-btn">اطلب عبر الواتساب</button>
                    </div>
                </div>
            </div>
            
            <button class="slide-btn left-btn">&lt;</button>
        </div>
    </section>

    <!-- قسم طاولات الوسط -->
    <section class="category-section" id="center-tables-section">
        <div class="section-header">
            <h3>طاولات وسط</h3>
            <button class="view-all-btn">عرض الكل</button>
        </div>
        
        <div class="carousel-wrapper">
            <button class="slide-btn right-btn">&gt;</button>
            
            <div class="products-carousel" id="center-carousel">
                <!-- منتج 1 -->
                <div class="product-card" data-name="طقم طاولات وسط زجاج">
                    <img src="images/center1.jpg" alt="طاولة وسط">
                    <div class="product-info">
                        <button class="whatsapp-btn">اطلب عبر الواتساب</button>
                    </div>
                </div>
                <!-- منتج 2 -->
                <div class="product-card" data-name="طاولة وسط خشبية">
                    <img src="images/center2.jpg" alt="طاولة وسط">
                    <div class="product-info">
                        <button class="whatsapp-btn">اطلب عبر الواتساب</button>
                    </div>
                </div>
                <!-- منتج 3 -->
                <div class="product-card" data-name="طاولة وسط بديل الرخام">
                    <img src="images/center3.jpg" alt="طاولة وسط">
                    <div class="product-info">
                        <button class="whatsapp-btn">اطلب عبر الواتساب</button>
                    </div>
                </div>
                <!-- منتج 4 -->
                <div class="product-card" data-name="طاولة قهوة مودرن">
                    <img src="images/center4.jpg" alt="طاولة وسط">
                    <div class="product-info">
                        <button class="whatsapp-btn">اطلب عبر الواتساب</button>
                    </div>
                </div>
                <!-- منتج 5 -->
                <div class="product-card" data-name="طاولة وسط ذهبية">
                    <img src="images/center5.jpg" alt="طاولة وسط">
                    <div class="product-info">
                        <button class="whatsapp-btn">اطلب عبر الواتساب</button>
                    </div>
                </div>
            </div>
            
            <button class="slide-btn left-btn">&lt;</button>
        </div>
    </section>

    <!-- ربط ملف الجافاسكربت -->
    <script src="script.js"></script>
</body>
</html>
