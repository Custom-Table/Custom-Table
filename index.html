<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> تفصيل طاولات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <h2>تفصيل طاولات</h2>
        </div>
        <div class="search-container">
            <input type="text" placeholder="البحث..." class="search-bar">
        </div>
    </header>

    <!-- قسم طاولات الطعام -->
    <section class="category-section" id="dining-tables-section">
        <div class="section-header">
            <h3>طاولات طعام</h3>
            <button class="view-all-btn">عرض الكل</button>
        </div>
        <div class="carousel-wrapper">
            <button class="slide-btn right-btn">&gt;</button>
            
            <!-- الحاوية فارغة، سيتم تعبئتها من الداتابيس -->
            <div class="products-carousel" id="dining-carousel"></div>
            
            <button class="slide-btn left-btn">&lt;</button>
        </div>
    </section>

    <!-- قسم طاولات الوسط -->
    <section class="category-section" id="center-tables-section">
        <div class="section-header">
            <h3>طاولات وسط</h3>
            <button class="view-all-btn">عرض الكل</button>
        </div>
        <div class="carousel-wrapper">
            <button class="slide-btn right-btn">&gt;</button>
            
            <!-- الحاوية فارغة، سيتم تعبئتها من الداتابيس -->
            <div class="products-carousel" id="center-carousel"></div>
            
            <button class="slide-btn left-btn">&lt;</button>
        </div>
    </section>

    <!-- مكتبات Firebase الأساسية وقاعدة البيانات -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <!-- ربط ملف الجافاسكربت الخاص بنا -->
    <script src="script.js"></script>
</body>
</html>
